{# Shared Report Content Modal — include in any page that shows AI-generated content #}
<div id="reportModal" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);align-items:center;justify-content:center;">
  <div style="background:var(--bg2,#13131f);border:1px solid var(--border,#1f1f38);border-radius:16px;padding:28px 28px 24px;max-width:460px;width:90%;position:relative;box-shadow:0 24px 60px rgba(0,0,0,0.5);">
    <button onclick="closeReportModal()" style="position:absolute;top:14px;right:16px;background:none;border:none;color:var(--text-2,#94a3b8);font-size:20px;cursor:pointer;line-height:1;" title="Close">✕</button>

    <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px;">
      <div style="width:36px;height:36px;border-radius:9px;background:rgba(239,68,68,0.15);display:flex;align-items:center;justify-content:center;font-size:17px;">🚩</div>
      <div>
        <div style="font-size:15px;font-weight:700;color:var(--text,#e2e8f0);">Report AI Content</div>
        <div style="font-size:12px;color:var(--text-2,#94a3b8);margin-top:2px;">Help us improve by flagging problematic content</div>
      </div>
    </div>

    <div style="margin-bottom:14px;">
      <label style="display:block;font-size:12px;font-weight:600;color:var(--text-2,#94a3b8);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.04em;">Reason *</label>
      <select id="reportReason" style="width:100%;padding:9px 12px;background:var(--bg3,#0a0a14);border:1px solid var(--border-l,#2a2a48);border-radius:8px;color:var(--text,#e2e8f0);font-size:14px;outline:none;">
        <option value="inaccurate">Inaccurate or misleading information</option>
        <option value="harmful">Harmful or dangerous content</option>
        <option value="offensive">Offensive or inappropriate</option>
        <option value="misleading">Professionally misleading</option>
        <option value="other">Other</option>
      </select>
    </div>

    <div style="margin-bottom:18px;">
      <label style="display:block;font-size:12px;font-weight:600;color:var(--text-2,#94a3b8);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.04em;">Additional details (optional)</label>
      <textarea id="reportDetails" rows="3" placeholder="Describe the issue in more detail..." style="width:100%;padding:9px 12px;background:var(--bg3,#0a0a14);border:1px solid var(--border-l,#2a2a48);border-radius:8px;color:var(--text,#e2e8f0);font-size:14px;outline:none;resize:vertical;font-family:inherit;"></textarea>
    </div>

    <div id="reportFeedback" style="display:none;margin-bottom:14px;padding:10px 14px;border-radius:8px;font-size:13px;"></div>

    <div style="display:flex;gap:10px;justify-content:flex-end;">
      <button onclick="closeReportModal()" style="padding:9px 18px;border-radius:8px;border:1px solid var(--border-l,#2a2a48);background:transparent;color:var(--text-2,#94a3b8);font-size:13px;font-weight:500;cursor:pointer;">Cancel</button>
      <button onclick="submitReport()" id="reportSubmitBtn" style="padding:9px 20px;border-radius:8px;border:none;background:rgba(239,68,68,0.85);color:#fff;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;">🚩 Submit Report</button>
    </div>
  </div>
</div>

<script>
(function() {
  let _reportMeta = {};

  window.openReportModal = function(contentType, contentId, snippetElementId) {
    _reportMeta.contentType = contentType || 'other';
    _reportMeta.contentId = contentId || '';
    if (snippetElementId) {
      const el = document.getElementById(snippetElementId);
      _reportMeta.snippet = el ? (el.textContent || el.innerText || '').trim().slice(0, 400) : '';
    } else {
      _reportMeta.snippet = '';
    }
    document.getElementById('reportReason').value = 'inaccurate';
    document.getElementById('reportDetails').value = '';
    const fb = document.getElementById('reportFeedback');
    fb.style.display = 'none'; fb.textContent = '';
    document.getElementById('reportSubmitBtn').disabled = false;
    document.getElementById('reportSubmitBtn').textContent = '🚩 Submit Report';
    const modal = document.getElementById('reportModal');
    modal.style.display = 'flex';
  };

  window.closeReportModal = function() {
    document.getElementById('reportModal').style.display = 'none';
  };

  window.submitReport = function() {
    const btn = document.getElementById('reportSubmitBtn');
    const fb = document.getElementById('reportFeedback');
    btn.disabled = true;
    btn.textContent = '⏳ Submitting...';
    fb.style.display = 'none';

    fetch('/api/report/content', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        content_type: _reportMeta.contentType,
        content_id: _reportMeta.contentId,
        content_snippet: _reportMeta.snippet,
        reason: document.getElementById('reportReason').value,
        details: document.getElementById('reportDetails').value.trim(),
      })
    })
    .then(r => r.json())
    .then(data => {
      if (data.success) {
        fb.style.cssText = 'display:block;background:rgba(16,185,129,0.12);border:1px solid rgba(16,185,129,0.35);color:#6ee7b7;';
        fb.textContent = '✅ Report submitted. Thank you for helping improve the quality of AI content.';
        btn.textContent = '✅ Reported';
        setTimeout(() => { window.closeReportModal(); }, 2400);
      } else {
        fb.style.cssText = 'display:block;background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.35);color:#fca5a5;';
        fb.textContent = '❌ ' + (data.error || 'Could not submit report. Please try again.');
        btn.disabled = false;
        btn.textContent = '🚩 Submit Report';
      }
    })
    .catch(() => {
      fb.style.cssText = 'display:block;background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.35);color:#fca5a5;';
      fb.textContent = '❌ Network error. Please try again.';
      btn.disabled = false;
      btn.textContent = '🚩 Submit Report';
    });
  };

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') window.closeReportModal();
  });
  document.getElementById('reportModal').addEventListener('click', function(e) {
    if (e.target === this) window.closeReportModal();
  });
})();
</script>
